apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-frontend
  namespace: demo-guard
  labels:
    app: demo-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-frontend
  template:
    metadata:
      labels:
        app: demo-frontend
    spec:
      containers:
        - name: app
          image: nginx:latest
          ports:
            - containerPort: 80
          securityContext:
            privileged: true
